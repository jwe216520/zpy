<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>植物的生長 — 章節總覽</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Noto+Serif+TC:wght@400;700&display=swap');

  :root {
    --green-dark: #2d6a4f;
    --green-mid: #52b788;
    --green-light: #b7e4c7;
    --green-pale: #d8f3dc;
    --accent-gold: #e9c46a;
    --accent-coral: #e76f51;
    --bg: #f7faf8;
    --surface: #ffffff;
    --text: #1a2e22;
    --text-soft: #4a6558;
    --border: #c8e6d0;
    --shadow: rgba(45, 106, 79, 0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  header {
    background: linear-gradient(135deg, var(--green-dark) 0%, #1b4332 100%);
    color: white;
    padding: 56px 32px 48px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  header::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 50%, rgba(82,183,136,0.18) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 30%, rgba(76,201,160,0.12) 0%, transparent 50%);
    pointer-events: none;
  }

  .header-icon {
    font-size: 56px;
    display: block;
    margin-bottom: 16px;
    filter: drop-shadow(0 4px 12px rgba(0,0,0,0.25));
  }

  header h1 {
    font-family: 'Noto Serif TC', serif;
    font-size: clamp(1.6rem, 4vw, 2.4rem);
    font-weight: 700;
    letter-spacing: 0.05em;
    margin-bottom: 10px;
    position: relative;
  }

  header p {
    font-size: 0.95rem;
    opacity: 0.78;
    letter-spacing: 0.08em;
    position: relative;
  }

  /* ── Main ── */
  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 56px 24px 64px;
    gap: 32px;
  }

  .subtitle {
    font-size: 0.9rem;
    color: var(--text-soft);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .subtitle::before,
  .subtitle::after {
    content: '';
    display: block;
    width: 40px;
    height: 1px;
    background: var(--border);
  }

  /* ── Cards ── */
  .cards {
    display: flex;
    gap: 28px;
    flex-wrap: wrap;
    justify-content: center;
    width: 100%;
    max-width: 860px;
  }

  .card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 20px;
    padding: 40px 36px 36px;
    flex: 1 1 320px;
    max-width: 400px;
    text-decoration: none;
    color: var(--text);
    display: flex;
    flex-direction: column;
    gap: 14px;
    box-shadow: 0 4px 24px var(--shadow);
    transition: transform 0.22s ease, box-shadow 0.22s ease, border-color 0.22s ease;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 5px;
    border-radius: 20px 20px 0 0;
  }

  .card-ch4::before { background: linear-gradient(90deg, var(--green-mid), var(--accent-gold)); }
  .card-ch5::before { background: linear-gradient(90deg, var(--green-dark), var(--green-mid)); }

  .card:hover {
    transform: translateY(-6px);
    box-shadow: 0 12px 40px rgba(45,106,79,0.18);
    border-color: var(--green-mid);
  }

  .card-chapter {
    font-size: 0.78rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--green-mid);
  }

  .card-icon {
    font-size: 42px;
    line-height: 1;
  }

  .card-title {
    font-family: 'Noto Serif TC', serif;
    font-size: 1.3rem;
    font-weight: 700;
    line-height: 1.4;
    color: var(--green-dark);
  }

  .card-desc {
    font-size: 0.88rem;
    color: var(--text-soft);
    line-height: 1.75;
    flex: 1;
  }

  .card-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 4px;
  }

  .tag {
    background: var(--green-pale);
    color: var(--green-dark);
    font-size: 0.75rem;
    font-weight: 500;
    padding: 3px 10px;
    border-radius: 99px;
    border: 1px solid var(--green-light);
  }

  .card-cta {
    margin-top: 8px;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 0.85rem;
    font-weight: 700;
    color: var(--green-dark);
    letter-spacing: 0.05em;
  }

  .card-cta svg {
    transition: transform 0.2s;
  }

  .card:hover .card-cta svg {
    transform: translateX(4px);
  }

  /* ── Footer ── */
  footer {
    text-align: center;
    padding: 20px;
    font-size: 0.78rem;
    color: var(--text-soft);
    border-top: 1px solid var(--border);
    letter-spacing: 0.05em;
  }
</style>
</head>
<body>

<header>
  <span class="header-icon">🌿</span>
  <h1>植物的生長</h1>
  <p>生物學 · 重點整理</p>
</header>

<main>
  <p class="subtitle">選擇章節</p>

  <div class="cards">

    <!-- Chapter 4 -->
    <a href="ch4_plant_growth.html" class="card card-ch4">
      <span class="card-chapter">Chapter 4</span>
      <div class="card-icon">🌸</div>
      <div class="card-title">植物的生殖</div>
      <p class="card-desc">探討植物有性生殖與無性生殖的機制，包含花的構造、授粉、受精、種子與果實的形成，以及各種無性繁殖方式。</p>
      <div class="card-tags">

      </div>
      <div class="card-cta">

        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
    </a>

    <!-- Chapter 5 -->
    <a href="ch5_plant_growth.html" class="card card-ch5">
      <span class="card-chapter">Chapter 5</span>
      <div class="card-icon">🌱</div>
      <div class="card-title">植物體的生長發育</div>
      <p class="card-desc">深入了解植物的生長發育過程，涵蓋植物激素的調節作用、向性運動、頂芽優勢，以及環境因子對生長的影響。</p>
      <div class="card-tags">
        <span class="tag">植物激素</span>
        <span class="tag">向性運動</span>
        <span class="tag">頂芽優勢</span>
        <span class="tag">生長調節</span>
      </div>
      <div class="card-cta">
        進入章節
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
    </a>

  </div>
</main>

<footer>植物的生長 · 生物學重點整理</footer>

</body>
</html>
